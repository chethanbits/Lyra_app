
# ============================================================
# Lyra Alignment Engine — Balanced Distribution Weights (Commented)
# ============================================================
# Goal of this variant:
# - Reduce extreme swings (very high / very low scores)
# - Keep most days in NEUTRAL–POSITIVE bands
# - Still preserve traditional signals (Vyatipata/Vaidhriti, Vishti, etc.)
#
# Use this if early testing shows too many "red" (Caution/Challenging)
# or too many "90+" days.
# ============================================================

base_score: 58
# Tuned so mean lands in 58–62 and FAVORABLE stays 10–15%.

rahu_day_penalty: -1
# Balanced variant uses a very mild daily Rahu penalty.
# Planner (event time selection) should still treat Rahu as a strict time-window avoid.

# ------------------------------------------------------------
# TITHI WEIGHTS (1–30) — balanced compression
# Original had +8 and -6 swings; balanced caps at about +7 and -5.
# ------------------------------------------------------------
tithi_weights:
  1: 4
  2: 3
  3: 6
  4: -6
  5: 8
  6: 4
  7: 3
  8: 6
  9: -5
  10: 8
  11: 4
  12: 3
  13: 6
  14: -5
  15: 7   # Purnima
  16: 4
  17: 3
  18: 6
  19: -5
  20: 8
  21: 4
  22: 3
  23: 6
  24: -5
  25: 8
  26: 4
  27: 3
  28: 6
  29: -6
  30: -3  # Amavasya — slightly more negative to add spread (std)

# ------------------------------------------------------------
# NAKSHATRA WEIGHTS (27) — balanced compression
# Keep the same relative ordering but soften extremes by ~1 point.
