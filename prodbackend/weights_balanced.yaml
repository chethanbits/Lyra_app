  Thursday: 3
  Friday: 2
  Saturday: -3

# ------------------------------------------------------------
# SCORE BANDS — FAVORABLE 73+ so only top ~10–15% (score 73 only in current distribution)
# ------------------------------------------------------------
bands:
  CHALLENGING: [0, 24]
  CAUTION: [25, 39]
  NEUTRAL: [40, 54]
  POSITIVE: [55, 72]
  FAVORABLE: [73, 100]
