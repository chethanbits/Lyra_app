# Render Blueprint: deploy Lyra API (prodbackend) as a Web Service.
# Connect this repo in Render dashboard, set Root Directory to prodbackend, then deploy.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lyra-pyjhora-api
    runtime: python
    rootDir: prodbackend
    buildCommand: pip install -r Requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
